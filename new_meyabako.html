<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon...</title>
    <link rel="icon" href="log.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 指定のメインカラー（深いネイビー） */
            --primary-color: #130182;
            /* アクセントには落ち着いたブラウングレーやゴールド系を微調整 */
            --accent-color: #bfa15f; 
            --bg-overlay: rgba(30, 30, 35, 0.75); /* 写真の上に重ねるダークな薄幕 */
            --card-bg: rgba(255, 255, 255, 0.95); /* 高級感のある少し透過した白 */
            --text-color: #2c2c35;
            --text-muted: #555560;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            /* 画像のような落ち着いたワークスペースの背景写真を設定 */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 告知カード全体のデザイン変更（角丸を少し落とし、洗練された影に） */
        .announcement-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 45px 50px;
            text-align: center;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(8px); /* 背景の微細なぼかし効果 */
        }

        /* 上部のアクセントラインを指定色に */
        .announcement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary-color);
        }

        /* バッジを落ち着いた雰囲気に変更 */
        .badge {
            background: var(--primary-color);
            color: white;
            padding: 6px 18px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 20px 0;
            font-weight: 700;
            line-height: 1.4;
        }
        
        h1 span {
            color: var(--primary-color);
            display: block;
            font-size: 2.2rem;
            margin-top: 10px;
            font-weight: 800;
        }

        .logo-container {
            margin: 25px auto;
            max-width: 400px;
            background: #f8f9fa;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #eaeaea;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .lead {
            font-size: 1.05rem;
            color: var(--text-color);
            max-width: 700px;
            margin: 0 auto 35px auto;
            text-align: center;
        }

        .lead p {
            margin: 8px 0;
        }

        /* 特徴ブロックのレイアウトと落ち着いたトーン化 */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 35px;
            text-align: left;
        }

        .feature-item {
            background: #ffffff;
            border: 1px solid #e8e8ed;
            padding: 25px 20px;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* アイコンの色を指定色に変更 */
        .feature-icon {
            font-size: 1.8rem;
            color: var(--primary-color); 
            margin-bottom: 12px;
        }

        .feature-item h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            color: var(--text-color);
            font-weight: 700;
        }

        .feature-item p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* スケジュール部分を上品なグレー×ゴールド（アクセント）に */
        .schedule {
            background: #f4f4f7;
            border-left: 4px solid var(--accent-color);
            padding: 18px 20px;
            border-radius: 4px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .schedule h2 {
            font-size: 1rem;
            margin: 0;
            color: var(--primary-color);
            letter-spacing: 0.5px;
        }

        .date {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
        }

        .footer-actions {
            margin-top: 15px;
        }

        /* ボタンのデザインを指定色ベースのシックなものに */
        .btn-back {
            display: inline-block;
            padding: 12px 35px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: #0b0052; /* より深いネイビーへ */
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(19, 1, 130, 0.3);
        }

        /* --- 🌟 アニメーション（一工夫）の実装 --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 各要素に初期非表示とアニメーションを設定（時間差で動かします） */
        .badge, h1, .logo-container, .lead, .feature-item, .schedule, .footer-actions {
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0; /* アニメーション開始前は非表示 */
        }

        /* 時間差（ディレイ）の調整 */
        .badge { animation-delay: 0.1s; }
        h1 { animation-delay: 0.2s; }
        .logo-container { animation-delay: 0.3s; }
        .lead { animation-delay: 0.4s; }
        
        /* 特徴ブロックは左から順にぽん、ぽん、ぽんと表示 */
        .features .feature-item:nth-child(1) { animation-delay: 0.5s; }
        .features .feature-item:nth-child(2) { animation-delay: 0.6s; }
        .features .feature-item:nth-child(3) { animation-delay: 0.7s; }
        
        .schedule { animation-delay: 0.8s; }
        .footer-actions { animation-delay: 0.9s; }

        /* レスポンシブ対応 */
        @media (max-width: 768px) {
            .announcement-card {
                padding: 30px 20px;
            }
            .features {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .schedule {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }
            body {
                display: block;
            }
            .container {
                margin: 0 auto;
            }
            h1 { font-size: 1.4rem; }
            h1 span { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="announcement-card">
            <div class="badge"><i class="fa-solid fa-rocket"></i> NEXT PROJECT</div>
            
            <h1>生徒の声を、もっとカタチに。<span>新・デジタル目安箱 開発決定！！</span></h1>
            
            <div class="logo-container">
                <img src="logoo.png" alt="新・デジタル目安箱 ロゴ">
            </div>

            <div class="lead">
                <p>生徒の皆さんの声をもっと届けやすくするため、目安箱の全面リニューアルが決定！</p>
                <p>今よりもっと便利になる新機能を多数搭載して生まれ変わります。</p>
            </div>

            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-spinner"></i></div>
                    <h3>進捗状況確認機能</h3>
                    <p>生徒会が今どこまで対応をしているのか、一目で確認。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-comment-dots"></i></div>
                    <h3>新・チャット機能</h3>
                    <p>意見の詳細やその他やり取りを匿名で生徒会と行うことができます。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-lightbulb"></i></div>
                    <h3>そのほかにも</h3>
                    <p>様々な新機能を追加し、より使いやすいデジタル目安箱へ。</p>
                </div>
            </div>

            <div class="schedule">
                <h2><i class="fa-solid fa-calendar-days"></i> 公開予定日</h2>
                <p class="date">未定 (決定次第、改めてお知らせします)</p>
            </div>

            <div class="footer-actions">
                <a href="https://dai1sc.wixsite.com/d1-sc" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i> ホームページに戻る
                </a>
            </div>
        </div>
    </div>

</body>
</html>
