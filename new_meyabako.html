<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon...</title>
    <link rel="icon" href="log.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 指定のメインカラー（深いネイビー） */
            --primary-color: #130182;
            
            /* 深海の背景ベースグラデーション */
            --bg-deep-sea: linear-gradient(180deg, #102a75 0%, #061148 40%, #020521 100%);
            
            /* アクセントには静かな光をイメージしたプラチナゴールド系 */
            --accent-color: #d1c1a1; 
            
            /* カードの背景：少し透過を強めて背景の光が綺麗に透けるように調整 */
            --card-bg: rgba(245, 248, 255, 0.92); 
            
            --text-color: #1a1a2e;
            --text-muted: #505070;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: var(--bg-deep-sea);
            position: relative;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- 🌊 劇的に強化した「差し込む光」のエフェクト --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                /* 1. 水面の最も明るい中央の輝き */
                radial-gradient(circle at 50% -10%, rgba(135, 206, 250, 0.6) 0%, rgba(16, 42, 117, 0) 45%),
                
                /* 2. 左から右斜め下に走るシャープな光の筋 */
                repeating-linear-gradient(115deg, 
                    rgba(255, 255, 255, 0) 0%, 
                    rgba(255, 255, 255, 0) 4%, 
                    rgba(143, 188, 253, 0.08) 7%, 
                    rgba(255, 255, 255, 0) 10%, 
                    rgba(255, 255, 255, 0) 14%
                ),
                
                /* 3. 右から左斜め下に交差する柔らかな光の筋 */
                repeating-linear-gradient(65deg, 
                    rgba(255, 255, 255, 0) 0%, 
                    rgba(255, 255, 255, 0) 8%, 
                    rgba(179, 212, 255, 0.06) 12%, 
                    rgba(255, 255, 255, 0) 16%, 
                    rgba(255, 255, 255, 0) 22%
                ),
                
                /* 4. 水深による減衰（下に行くほど光を遮る黒のグラデーション） */
                linear-gradient(to bottom, rgba(0,0,0,0) 20%, rgba(2, 5, 33, 0.7) 80%);
                
            background-size: cover;
            filter: blur(2px); /* 光の筋を少しだけ自然に馴染ませる */
            z-index: -2;
        }

        /* 水中のわずかな気泡エフェクト（別レイヤーで分離） */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.02) 2px, transparent 2px),
                radial-gradient(circle at 40% 85%, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px, 60px 60px, 80px 80px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* 告知カード（背景がシースルーになって光が後ろを通ります） */
        .announcement-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0, 0, 10, 0.4);
            padding: 45px 50px;
            text-align: center;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(8px); /* 磨りガラス効果を少し強めて美しく */
            -webkit-backdrop-filter: blur(8px);
        }

        .announcement-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: var(--primary-color);
        }

        .badge {
            background: var(--primary-color);
            color: white;
            padding: 7px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.2px;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(19, 1, 130, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 20px 0;
            font-weight: 700;
            line-height: 1.4;
        }
        
        h1 span {
            color: var(--primary-color);
            display: block;
            font-size: 2.2rem;
            margin-top: 10px;
            font-weight: 800;
        }

        .logo-container {
            margin: 25px auto;
            max-width: 400px;
            background: #ffffff;
            border-radius: 6px;
            padding: 12px;
            border: 1px solid #e0e6ed;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .lead {
            font-size: 1.05rem;
            color: var(--text-color);
            max-width: 700px;
            margin: 0 auto 35px auto;
            text-align: center;
        }

        .lead p {
            margin: 8px 0;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 35px;
            text-align: left;
        }

        .feature-item {
            background: #ffffff;
            border: 1px solid #e6ebf2;
            padding: 25px 20px;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(19, 1, 130, 0.06);
            border-color: #d1d9e6;
        }

        .feature-icon {
            font-size: 1.9rem;
            color: var(--primary-color); 
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 4px rgba(19, 1, 130, 0.1));
        }

        .feature-item h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            color: var(--text-color);
            font-weight: 700;
        }

        .feature-item p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .schedule {
            background: #eef2f9;
            border-left: 4px solid var(--accent-color);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .schedule h2 {
            font-size: 1rem;
            margin: 0;
            color: var(--primary-color);
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .date {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
        }

        .footer-actions {
            margin-top: 15px;
        }

        .btn-back {
            display: inline-block;
            padding: 13px 38px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(19, 1, 130, 0.3);
        }

        .btn-back:hover {
            background-color: #0b0052;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(19, 1, 130, 0.4);
        }

        /* --- アニメーション --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge, h1, .logo-container, .lead, .feature-item, .schedule, .footer-actions {
            animation: fadeInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0; 
        }

        .badge { animation-delay: 0.15s; }
        h1 { animation-delay: 0.3s; }
        .logo-container { animation-delay: 0.45s; }
        .lead { animation-delay: 0.6s; }
        
        .features .feature-item:nth-child(1) { animation-delay: 0.75s; }
        .features .feature-item:nth-child(2) { animation-delay: 0.9s; }
        .features .feature-item:nth-child(3) { animation-delay: 1.05s; }
        
        .schedule { animation-delay: 1.2s; }
        .footer-actions { animation-delay: 1.35s; }

        @media (max-width: 768px) {
            .announcement-card { padding: 35px 25px; }
            .features { grid-template-columns: 1fr; gap: 15px; }
            .schedule { flex-direction: column; gap: 5px; text-align: center; padding: 15px; }
            body { display: block; }
            .container { margin: 0 auto; padding: 30px 15px; }
            h1 { font-size: 1.4rem; }
            h1 span { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="announcement-card">
            <div class="badge"><i class="fa-solid fa-rocket"></i> NEXT PROJECT</div>
            
            <h1>生徒の声を、もっとカタチに。<span>新・デジタル目安箱 開発決定！！</span></h1>
            
            <div class="logo-container">
                <img src="logoo.png" alt="新・デジタル目安箱 ロゴ">
            </div>

            <div class="lead">
                <p>生徒の皆さんの声をもっと届けやすくするため、目安箱の全面リニューアルが決定！</p>
                <p>今よりもっと便利になる新機能を多数搭載して生まれ変わります。</p>
            </div>

            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-spinner"></i></div>
                    <h3>進捗状況確認機能</h3>
                    <p>生徒会が今どこまで対応をしているのか、一目で確認。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-comment-dots"></i></div>
                    <h3>新・チャット機能</h3>
                    <p>意見の詳細やその他やり取りを匿名で生徒会と行うことができます。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-lightbulb"></i></div>
                    <h3>そのほかにも</h3>
                    <p>様々な新機能を追加し、より使いやすいデジタル目安箱へ。</p>
                </div>
            </div>

            <div class="schedule">
                <h2><i class="fa-solid fa-calendar-days"></i> 公開予定日</h2>
                <p class="date">未定 (決定次第、改めてお知らせします)</p>
            </div>

            <div class="footer-actions">
                <a href="https://dai1sc.wixsite.com/d1-sc" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i> ホームページに戻る
                </a>
            </div>
        </div>
    </div>

</body>
</html>
