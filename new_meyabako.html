<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comming Soon...</title>
    <link rel="icon" href="log.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2b2d42;
            --text-muted: #6c757d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .announcement-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 30px 40px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .announcement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .badge {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(255, 65, 108, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 2rem;
            color: var(--text-color);
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        h1 span {
            color: var(--primary-color);
            display: block;
            font-size: 2.4rem;
            margin-top: 5px;
        }

        .logo-container {
            margin: 15px auto;
            max-width: 380px;
            padding: 15px 25px;
            background: #f1f3f9;
            border-radius: 12px;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .lead {
            font-size: 1.1rem;
            color: var(--text-color);
            max-width: 750px;
            margin: 0 auto 25px auto;
            text-align: center;
            font-weight: 500;
        }

        .lead p {
            margin: 4px 0;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .feature-item {
            background: #fdfdfd;
            border: 1px solid #eef2f5;
            padding: 25px 20px;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2rem;
            color: #3b82f6; 
            margin-bottom: 15px;
        }

        .feature-item h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: var(--text-color);
            font-weight: bold;
        }

        .feature-item p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .schedule {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .schedule h2 {
            font-size: 1.1rem;
            margin: 0;
            color: var(--secondary-color);
        }

        .date {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-color);
            margin: 0;
        }

        .footer-actions {
            margin-top: 10px;
        }

        .btn-back {
            display: inline-block;
            padding: 10px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        .btn-back:hover {
            background-color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .features {
                grid-template-columns: 1fr;
            }
            .schedule {
                flex-direction: column;
                gap: 5px;
            }
            body {
                display: block;
            }
            .container {
                margin: 20px auto;
            }
            h1 { font-size: 1.6rem; }
            h1 span { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="announcement-card">
            <div class="badge"><i class="fa-solid fa-rocket"></i> NEXT PROJECT</div>
            
            <h1>生徒の声を、もっとカタチに。<span>新・デジタル目安箱 開発決定！！</span></h1>
            
            <div class="logo-container">
                <img src="logoo.png" alt="新・デジタル目安箱 ロゴ">
            </div>

            <div class="lead">
                <p>生徒の皆さんの声をより早く学校運営に届けるため、目安箱の全面リニューアルが決定！</p>
                <p>現在の使いやすさはそのままに、さらにみんなが参加したくなる新機能を多数搭載して生まれ変わります。</p>
            </div>

            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-spinner"></i></div>
                    <h3>進捗状況確認機能</h3>
                    <p>生徒会が今どこまで対応をしているのか、一目で確認。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-comment-dots"></i></div>
                    <h3>新・チャット機能</h3>
                    <p>意見の詳細やその他やり取りを匿名で生徒会と行うことができます。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-lightbulb"></i></div>
                    <h3>そのほかにも</h3>
                    <p>様々な新機能を追加し、より使いやすいデジタル目安箱へ。</p>
                </div>
            </div>

            <div class="schedule">
                <h2><i class="fa-solid fa-calendar-days"></i> 公開予定日</h2>
                <p class="date">未定 (決定次第、改めてお知らせします)</p>
            </div>

            <div class="footer-actions">
                <a href="https://dai1sc.wixsite.com/d1-sc" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i> ホームページに戻る
                </a>
            </div>
        </div>
    </div>

</body>
</html>
