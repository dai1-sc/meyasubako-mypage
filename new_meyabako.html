<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon...</title>
    <link rel="icon" href="log.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #130182;
            --bg-deep-sea: linear-gradient(180deg, #102a75 0%, #061148 40%, #020521 100%);
            --accent-color: #d1c1a1; 
            --card-bg: rgba(245, 248, 255, 0.93); 
            --text-color: #1a1a2e;
            --text-muted: #505070;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: var(--bg-deep-sea);
            position: relative;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            height: 100vh; /* 画面にぴったり収める */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* スクロールバーを消して一画面に固定 */
        }

        /* 🌊 差し込む光のエフェクト */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 50% -10%, rgba(135, 206, 250, 0.6) 0%, rgba(16, 42, 117, 0) 45%),
                repeating-linear-gradient(115deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 4%, rgba(143, 188, 253, 0.08) 7%, rgba(255, 255, 255, 0) 10%, rgba(255, 255, 255, 0) 14%),
                repeating-linear-gradient(65deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 8%, rgba(179, 212, 255, 0.06) 12%, rgba(255, 255, 255, 0) 16%, rgba(255, 255, 255, 0) 22%),
                linear-gradient(to bottom, rgba(0,0,0,0) 20%, rgba(2, 5, 33, 0.7) 80%);
            background-size: cover;
            filter: blur(2px);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.02) 2px, transparent 2px),
                radial-gradient(circle at 40% 85%, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px, 60px 60px, 80px 80px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1200px; /* 横幅を広げて要素を並べやすく */
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* 📋 横型の2カラムレイアウトに変形 */
        .announcement-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 10, 0.4);
            padding: 40px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            display: grid;
            grid-template-columns: 1.1fr 1.2fr; /* 左右に分割 */
            gap: 40px;
            align-items: center;
        }

        .announcement-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: var(--primary-color);
        }

        /* 左カラム：タイトル、ロゴ、リード文 */
        .left-column {
            text-align: left;
        }

        .badge {
            background: var(--primary-color);
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.2px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-color);
            margin: 0 0 15px 0;
            font-weight: 700;
            line-height: 1.4;
        }
        
        h1 span {
            color: var(--primary-color);
            display: block;
            font-size: 1.9rem;
            margin-top: 5px;
            font-weight: 800;
        }

        .logo-container {
            margin: 20px 0;
            max-width: 380px;
            background: #ffffff;
            border-radius: 10px;
            padding: 8px 40px;
            border: 1px solid #e0e6ed;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .lead {
            font-size: 0.95rem;
            color: var(--text-color);
            margin: 0;
        }
        .lead p { margin: 5px 0; }

        /* 右カラム：特徴、スケジュール、ボタン */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            justify-content: center;
        }

        /* 特徴ブロックを縦にコンパクトに並べる */
        .features {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feature-item {
            background: #ffffff;
            border: 1px solid #e6ebf2;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateX(4px); /* 横型に合わせて右に少し動く */
            box-shadow: 0 6px 15px rgba(19, 1, 130, 0.05);
            border-color: #d1d9e6;
        }

        .feature-icon {
            font-size: 1.6rem;
            color: var(--primary-color); 
            flex-shrink: 0;
            width: 35px;
            text-align: center;
        }

        .feature-text h3 {
            margin: 0 0 2px 0;
            font-size: 1rem;
            color: var(--text-color);
            font-weight: 700;
        }

        .feature-text p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* スケジュールをコンパクトに */
        .schedule {
            background: #eef2f9;
            border-left: 4px solid var(--accent-color);
            padding: 12px 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .schedule h2 {
            font-size: 0.9rem;
            margin: 0;
            color: var(--primary-color);
            font-weight: 700;
        }

        .date {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
        }

        .footer-actions {
            margin-top: 5px;
            text-align: right;
        }

        .btn-back {
            display: inline-block;
            padding: 10px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(19, 1, 130, 0.25);
        }

        .btn-back:hover {
            background-color: #0b0052;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(19, 1, 130, 0.35);
        }

        /* ✨ アニメーション（ディレイを横の流れに合わせて最適化） */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge, h1, .logo-container, .lead, .feature-item, .schedule, .footer-actions {
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0; 
        }

        /* 左カラムから右カラムへ流れるように出現 */
        .badge { animation-delay: 0.1s; }
        h1 { animation-delay: 0.2s; }
        .logo-container { animation-delay: 0.3s; }
        .lead { animation-delay: 0.4s; }
        
        .features .feature-item:nth-child(1) { animation-delay: 0.5s; }
        .features .feature-item:nth-child(2) { animation-delay: 0.6s; }
        .features .feature-item:nth-child(3) { animation-delay: 0.7s; }
        
        .schedule { animation-delay: 0.8s; }
        .footer-actions { animation-delay: 0.9s; }

        /* タブレット・スマホ用のレスポンシブ（画面が狭いときは自動で縦に戻してスクロール可能に） */
        @media (max-width: 900px) {
            body { height: auto; overflow: auto; display: block; }
            .container { padding: 20px 12px; }
            .announcement-card {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 30px 20px;
            }
            .right-column { gap: 20px; }
            .feature-item { flex-direction: column; text-align: center; padding: 15px; }
            .schedule { flex-direction: column; gap: 5px; text-align: center; }
            .footer-actions { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="announcement-card">
            
            <div class="left-column">
                <div class="badge"><i class="fa-solid fa-rocket"></i> NEXT PROJECT</div>
                
                <h1>生徒の声を、もっとカタチに。<span>新・デジタル目安箱 開発決定！！</span></h1>
                
                <div class="logo-container">
                    <img src="coming_loto.png" alt="新・デジタル目安箱 ロゴ">
                </div>

                <div class="lead">
                    <p>生徒の皆さんの声をもっと届けやすくするため、目安箱の全面リニューアルが決定！</p>
                    <p>今よりもっと便利になる新機能を多数搭載して生まれ変わります。</p>
                </div>
            </div>

            <div class="right-column">
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fa-solid fa-spinner"></i></div>
                        <div class="feature-text">
                            <h3>進捗状況確認機能</h3>
                            <p>生徒会が今どこまで対応をしているのか、一目で確認。</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fa-solid fa-comment-dots"></i></div>
                        <div class="feature-text">
                            <h3>新・チャット機能</h3>
                            <p>意見の詳細やその他やり取りを匿名で生徒会と行うことができます。</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fa-solid fa-lightbulb"></i></div>
                        <div class="feature-text">
                            <h3>そのほかにも</h3>
                            <p>様々な新機能を追加し、より使いやすいデジタル目安箱へ。</p>
                        </div>
                    </div>
                </div>

                <div class="schedule">
                    <h2><i class="fa-solid fa-calendar-days"></i> 公開予定日</h2>
                    <p class="date">7月7日(火)</p>
                </div>

                <div class="footer-actions">
                    <a href="https://dai1sc.wixsite.com/d1-sc" class="btn-back">
                        <i class="fa-solid fa-arrow-left"></i> ホームページに戻る
                    </a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
