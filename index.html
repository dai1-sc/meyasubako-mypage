<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル目安箱 - ログインポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .brand-bg { background-color: #130182; }
        .brand-text { color: #130182; }
        .brand-border { border-color: #130182; }
        .brand-hover:hover { background-color: #0d005c; }
        
        /* 知的でモダンな背景グラデーション */
        .login-bg {
            background: radial-gradient(circle at 20% 20%, rgba(19, 1, 130, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(19, 1, 130, 0.04) 0%, transparent 50%),
                        #f8fafc;
        }
    </style>
</head>
<body class="login-bg font-sans min-h-screen flex flex-col justify-center items-center p-4">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl border border-gray-100 max-w-md w-full text-center transition-all transform hover:scale-[1.01]">
        
        <div class="w-20 h-20 brand-bg text-white rounded-2xl flex items-center justify-center text-3xl mx-auto shadow-md mb-6">
            <i class="fas fa-inbox"></i>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 tracking-wide mb-2">デジタル目安箱</h1>
        <p class="text-sm text-gray-500 mb-8">学校アカウント（Google）でログインしてください</p>

        <div id="alert-box" class="hidden mb-6 p-3 rounded-lg text-sm font-medium"></div>

        <button id="btn-login" class="w-full flex items-center justify-center space-x-3 bg-white border border-gray-300 text-gray-700 py-3 px-4 rounded-xl font-medium hover:bg-gray-50 transition shadow-sm active:bg-gray-100">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12 5.04c1.62 0 3.08.56 4.22 1.65l3.14-3.14C17.43 1.68 14.93 1 12 1 7.35 1 3.4 3.65 1.5 7.5l3.6 2.8C6.01 7.15 8.79 5.04 12 5.04z"/>
                <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.34H12v4.44h6.44c-.28 1.48-1.12 2.74-2.38 3.58l3.6 2.8c2.1-1.94 3.33-4.8 3.33-8.48z"/>
                <path fill="#FBBC05" d="M5.1 14.7c-.24-.72-.38-1.49-.38-2.3s.14-1.58.38-2.3L1.5 7.3C.54 9.21 0 11.35 0 13.6s.54 4.39 1.5 6.3l3.6-2.82z"/>
                <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.6-2.8c-1.1.74-2.52 1.18-4.36 1.18-3.21 0-5.99-2.11-6.95-5.26l-3.6 2.82C3.4 20.35 7.35 23 12 23z"/>
            </svg>
            <span>Googleアカウントでサインイン</span>
        </</button>

        <div class="mt-8 pt-6 border-t border-gray-100 flex items-start space-x-2 text-left">
            <i class="fas fa-shield-alt text-gray-400 mt-1 shrink-0 text-xs"></i>
            <p class="text-[11px] text-gray-400 leading-relaxed">
                本システムは、生徒会および管理者が皆さんの意見を適切に処理するためGoogleログインを必須としていますが、投書自体の公開やチャット対応は<strong>完全匿名</strong>で行われます。メールアドレスが生徒会に直接開示されることはありません。
            </p>
        </div>
    </div>

    <footer class="mt-8 text-xs text-gray-400">
        &copy; 2026 Digital Meyasubako System
    </footer>

    <script type="module">
        // 必要なモジュールをFirebase CDNからインポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️【要書き換え】Firebaseコンソールから取得した設定オブジェクト
const firebaseConfig = {
  apiKey: "AIzaSyBaCpz1hVRsWtqEMjtAPfjovY7VNyZRhQc",
  authDomain: "digital-suggestion-box-system.firebaseapp.com",
  projectId: "digital-suggestion-box-system",
  storageBucket: "digital-suggestion-box-system.firebasestorage.app",
  messagingSenderId: "434577827266",
  appId: "1:434577827266:web:1614d8197b35090260a25b"
};

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // UI要素の取得
        const btnLogin = document.getElementById("btn-login");
        const alertBox = document.getElementById("alert-box");

        // アラート表示用関数
        function showAlert(message, type) {
            alertBox.innerText = message;
            alertBox.className = `mb-6 p-3 rounded-lg text-sm font-medium ${
                type === 'error' ? 'bg-red-50 text-red-700' : 'bg-blue-50 text-blue-700'
            }`;
        }

        // ログインボタンのクリックイベント
        btnLogin.addEventListener("click", async () => {
            // ローディング状態に変更
            btnLogin.disabled = true;
            showAlert("認証中...", "info");

            try {
                // 1. Googleポップアップログインを実行
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // 2. Firestoreからログインした生徒のメールアドレスを元に権限(Role)を取得
                // Firestore内のドキュメントパス： users / [メールアドレス]
                const userDocRef = doc(db, "users", user.email);
                const userDoc = await getDoc(userDocRef);

                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    const role = userData.role; // 'admin' , 'council' , 'student'

                    showAlert("ログイン成功！画面を切り替えます...", "info");

                    // 3. 権限に応じて適切なページにリダイレクト
                    if (role === "admin") {
                        window.location.href = "admin.html";   // 管理者ページへ
                    } else if (role === "council") {
                        window.location.href = "council.html"; // 生徒会役員ページへ
                    } else {
                        window.location.href = "mypage.html";  // 一般生徒マイページへ
                    }
                } else {
                    // Firestoreに登録がなかった場合はデフォルトで一般生徒マイページへ
                    showAlert("一般生徒としてマイページに移動します...", "info");
                    setTimeout(() => {
                        window.location.href = "mypage.html";
                    }, 1000);
                }

            } catch (error) {
                console.error("Login Error:", error);
                showAlert(`ログインに失敗しました: ${error.message}`, "error");
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
