<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル目安箱 - ログインポータル</title>
    <link rel="icon" href="log.png" type="image/png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#130182">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="デジタル目安箱">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .brand-bg { background-color: #130182; }
        
        /* ==========================================================================
           🎋 七夕限定 演出用カスタマイズCSS (mypage.htmlと統一)
           ========================================================================== */
        
        /* ⑦ ネイビーのグラデーション背景 (固定) */
        .login-bg {
            background: linear-gradient(180deg, #09052d 0%, #12015d 50%, #26104d 100%) !important;
            background-attachment: fixed !important;
        }
        #splash-screen.hide{
            opacity:0;
            pointer-events:none;
        }
        @keyframes floatLogo{
            0%,100%{ transform:translateY(0); }
            50%{ transform:translateY(-6px); }
        }
        @keyframes logoPop{
            0%{ transform:scale(.8); opacity:0; }
            70%{ transform:scale(1.05); }
            100%{ transform:scale(1); opacity:1; }
        }

        #splash-screen img{
            animation:
                logoPop .8s ease,
                floatLogo 2.5s ease-in-out infinite .8s;
        }
        #splash-screen{
            background:
                radial-gradient(circle at 10% 10%, rgba(19,130,.06) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(19,1,130,.04) 0%, transparent 50%),
                #fff;
        }

        /* ① 星空の背景（アニメーション）*/
        .starry-sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ② 流れ星 */
        .shooting-star {
            position: fixed;
            top: -10px;
            right: 10%;
            width: 2px;
            height: 80px;
            background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
            animation: shoot 7s infinite linear;
        }
        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(45deg); opacity: 0; }
            5% { opacity: 1; }
            15% { transform: translate(-400px, 400px) rotate(45deg); opacity: 0; }
            100% { transform: translate(-400px, 400px) rotate(45deg); opacity: 0; }
        }

        /* ③ 笹の葉 (左右上部・透明度30%・ゆらゆら揺れる) */
        .bamboo-left, .bamboo-right {
            position: fixed;
            top: 0;
            font-size: 7rem;
            opacity: 0.3;
            pointer-events: none;
            z-index: 10;
            user-select: none;
        }
        .bamboo-left { left: 10px; transform-origin: top left; animation: swayLeft 6s infinite ease-in-out; }
        .bamboo-right { right: 10px; transform-origin: top right; animation: swayRight 6.5s infinite ease-in-out; }
        @keyframes swayLeft {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(4deg); }
        }
        @keyframes swayRight {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-4deg); }
        }

        /* ⑤ 星がふわっと浮いて消えるアニメーション */
        .floating-stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .float-sparkle {
            position: absolute;
            color: rgba(255, 223, 0, 0.6);
            font-size: 14px;
            animation: floatUp 8s infinite linear;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-5vh) translateX(50px) scale(1.2); opacity: 0; }
        }

        /* ⑥ ガラスっぽさ追加 (元の文字視認性を壊さない) */
        .glass-card {
            background: rgba(255, 255, 255, 0.94) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
        }
    </style>
</head>
<body class="login-bg font-sans min-h-screen flex flex-col justify-center items-center p-4 relative overflow-hidden">
   
    <div class="starry-sky">
        <div class="star" style="top: 15%; left: 20%; width: 3px; height: 3px; animation-delay: 0.5s;"></div>
        <div class="star" style="top: 25%; left: 75%; width: 2px; height: 2px; animation-delay: 1.2s;"></div>
        <div class="star" style="top: 45%; left: 10%; width: 4px; height: 4px; animation-delay: 0s;"></div>
        <div class="star" style="top: 65%; left: 85%; width: 3px; height: 3px; animation-delay: 2.1s;"></div>
        <div class="star" style="top: 80%; left: 40%; width: 2px; height: 2px; animation-delay: 1.7s;"></div>
        <div class="star" style="top: 50%; left: 60%; width: 3px; height: 3px; animation-delay: 0.8s;"></div>
    </div>

    <div class="shooting-star"></div>

    <div class="floating-stars">
        <div class="float-sparkle" style="left: 15%; animation-delay: 0s; animation-duration: 12s;">✨</div>
        <div class="float-sparkle" style="left: 45%; animation-delay: 3s; animation-duration: 14s;">⭐</div>
        <div class="float-sparkle" style="left: 80%; animation-delay: 6s; animation-duration: 11s;">✨</div>
    </div>

    <div class="bamboo-left">🎋</div>
    <div class="bamboo-right">🎋</div>

   <div id="splash-screen"
     class="fixed inset-0 flex flex-col items-center justify-center z-[9999] transition-opacity duration-700">
    <img src="log.png" class="w-28 h-28" alt="Logo">
    <h1 class="mt-6 text-xl font-black text-[#130182]">デジタル目安箱</h1>
    <p id="loading-text" class="mt-2 text-sm text-slate-500">Loading</p>
   </div>



    <div class="bg-white glass-card p-8 md:p-12 rounded-3xl shadow-2xl border border-gray-100 max-w-md w-full text-center transition-all duration-300 relative z-10 animate__animated animate__fadeInUp">
        
        <div class="flex justify-center mb-6 transform hover:scale-105 transition-transform duration-300">
            <img src="logo_title.png" alt="デジタル目安箱 ロゴ" class="w-35 h-35 object-contain">
        </div>

        <h1 class="text-2xl font-black text-gray-800 tracking-wider mb-2">デジタル目安箱</h1>
        <p class="text-sm text-gray-400 mb-8 font-medium">学校アカウント（Google）でログインしてください</p>

        <div id="status-container" class="hidden mb-8 p-6 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col items-center justify-center space-y-4 animate__animated animate__fadeIn">
            <div id="status-spinner" class="w-12 h-12 rounded-full border-4 border-slate-200 border-t-indigo-600 animate-spin"></div>
            <div id="status-success-icon" class="hidden w-14 h-14 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-2xl font-bold shadow-inner border border-green-200 animate__animated animate__bounceIn">✓</div>
            <div id="status-error-icon" class="hidden w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-2xl font-bold shadow-inner border border-red-200 animate__animated animate__shakeX">!</div>
            <p id="status-text" class="text-gray-600 font-bold tracking-wide animate-pulse text-sm"></p>
        </div>

        <div id="login-btn-wrapper" class="flex justify-center w-full transition-all duration-300">
            <div id="g_id_onload"
                 data-client_id="363133502855-gi2t4f4ek5o87vk6mam8srciorh14jg2.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_select="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="pill" data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100 flex items-start space-x-2 text-left">
            <i class="fas fa-shield-alt text-indigo-400 mt-1 shrink-0 text-xs"></i>
            <p class="text-[11px] text-gray-400 leading-relaxed font-medium">
                本システムは、生徒会が意見を適切に処理するためGoogleログインを必須としていますが、投書の公開やチャット対応は<strong>原則匿名</strong>で行われます。メールアドレスが生徒会に直接開示されることは運用規定第4条2項の場合を除き、ありません。
            </p>
        </div>
    </div>

    <footer class="mt-8 text-xs text-slate-400 font-medium relative z-10">&copy; 2026 第一高校 生徒会 All Rights Reserved.</footer>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycby_n6kO6vLnOUnVAhQgAbr052pdxuMdXbiR1R9fPJDhNh5inohnrtOZXuMFCq_ex1CM/exec";

    // ── 自動ログイン：保存済みセッションを確認 ──────────────────────────
    (function checkSavedSession() {
        const saved = localStorage.getItem("login_session");
        if (!saved) return;

        try {
            const { email, role, expires } = JSON.parse(saved);
            if (Date.now() > expires) {
                // 期限切れ → 削除してログイン画面を表示
                localStorage.removeItem("login_session");
                return;
            }
            // 有効なセッションがあればそのまま飛ばす
            sessionStorage.setItem("user_email", email);
            sessionStorage.setItem("user_role", role);
            window.location.href = role === "admin" ? "admin.html" : "mypage.html";
        } catch (e) {
            localStorage.removeItem("login_session");
        }
    })();

    // ── 以下は既存コードそのまま ────────────────────────────────────────
    const statusContainer  = document.getElementById("status-container");
    const statusSpinner    = document.getElementById("status-spinner");
    const statusSuccessIcon= document.getElementById("status-success-icon");
    const statusErrorIcon  = document.getElementById("status-error-icon");
    const statusText       = document.getElementById("status-text");
    const loginBtnWrapper  = document.getElementById("login-btn-wrapper");

    function showStatus(message, type) {
        statusText.innerText = message;
        statusContainer.classList.remove("hidden");
        statusSpinner.classList.add("hidden");
        statusSuccessIcon.classList.add("hidden");
        statusErrorIcon.classList.add("hidden");
        statusText.classList.remove("animate-pulse","text-green-600","text-red-600","text-gray-600");

        if (type === 'info') {
            statusSpinner.classList.remove("hidden");
            statusText.classList.add("animate-pulse","text-gray-600");
        } else if (type === 'success') {
            statusSuccessIcon.classList.remove("hidden");
            statusText.classList.add("text-green-600");
            loginBtnWrapper.classList.add("opacity-30","pointer-events-none");
        } else if (type === 'error') {
            statusErrorIcon.classList.remove("hidden");
            statusText.classList.add("text-red-600");
        }
    }

    function decodeJwt(token) {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');
        const jsonPayload = decodeURIComponent(
            atob(base64).split('').map(c =>
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
            ).join('')
        );
        return JSON.parse(jsonPayload);
    }

    async function handleCredentialResponse(response) {
        showStatus("学校アカウントを確認しています...", "info");

        try {
            const responsePayload = decodeJwt(response.credential);
            const email = responsePayload.email;

            const res = await fetch(GAS_API_URL, {
                method: "POST",
                body: JSON.stringify({ email })
            });
            const result = await res.json();

            if (result.status === "success") {
                showStatus("認証成功！マイページへ移動します...", "success");

                const finalEmail = result.email || email;
                const finalRole  = result.role;

                sessionStorage.setItem("user_email", finalEmail);
                sessionStorage.setItem("user_role",  finalRole);

                // ── ここが追加部分：30日間有効なセッションを保存 ──
                const DAYS = 30;
                localStorage.setItem("login_session", JSON.stringify({
                    email:   finalEmail,
                    role:    finalRole,
                    expires: Date.now() + DAYS * 24 * 60 * 60 * 1000
                }));

                setTimeout(() => {
                    window.location.href = finalRole === "admin" ? "admin.html" : "mypage.html";
                }, 1200);

            } else {
                showStatus("ユーザー情報が見つかりません。登録を確認してください。", "error");
            }
        } catch (error) {
            console.error(error);
            showStatus("通信エラーが発生しました。電波の良い場所で試してください。", "error");
        }
    }

    // スプラッシュ画面（変更なし）
    window.addEventListener("DOMContentLoaded", () => {
        const splash = document.getElementById("splash-screen");
        const firstLaunch = !localStorage.getItem("splashShown");
        const delay = firstLaunch ? 4000 : 2000;
        localStorage.setItem("splashShown","true");

        const loadingTimer = setInterval(() => {
            const text = document.getElementById("loading-text");
            if (!text) return;
            const next = ((parseInt(text.dataset.dots||"0")) + 1) % 4;
            text.dataset.dots = next;
            text.textContent = "Loading" + ".".repeat(next);
        }, 400);

        setTimeout(() => {
            splash.classList.add("hide");
            clearInterval(loadingTimer);
            setTimeout(() => splash.remove(), 700);
        }, delay);
    });
</script>
</body>
</html>
