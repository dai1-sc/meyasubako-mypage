<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル目安箱 - ログインポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .brand-bg { background-color: #130182; }
        .login-bg {
            background: radial-gradient(circle at 20% 20%, rgba(19, 1, 130, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(19, 1, 130, 0.04) 0%, transparent 50%),
                        #f8fafc;
        }
    </style>
</head>
<body class="login-bg font-sans min-h-screen flex flex-col justify-center items-center p-4">

    <div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl border border-gray-100 max-w-md w-full text-center">
        
        <div class="flex justify-center mb-6">
    <img src="logo_title.png" alt="デジタル目安箱 ロゴ" class="w-30 h-30 object-contain">
</div>

        <h1 class="text-2xl font-bold text-gray-800 tracking-wide mb-2">デジタル目安箱</h1>
        <p class="text-sm text-gray-500 mb-8">学校アカウント（Google）でログインしてください</p>

        <div id="alert-box" class="hidden mb-6 p-3 rounded-lg text-sm font-medium text-left"></div>

        <div class="flex justify-center w-full">
            <div id="g_id_onload"
                 data-client_id="363133502855-gi2t4f4ek5o87vk6mam8srciorh14jg2.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_select="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100 flex items-start space-x-2 text-left">
            <i class="fas fa-shield-alt text-gray-400 mt-1 shrink-0 text-xs"></i>
            <p class="text-[11px] text-gray-400 leading-relaxed">
                本システムは、生徒会が意見を適切に処理するためGoogleログインを必須としていますが、投書の公開やチャット対応は<strong>原則匿名</strong>で行われます。メールアドレスが生徒会に直接開示されることは運用規定第◯条◯項の場合を除き、ありません。
            </p>
        </div>
    </div>

    <footer class="mt-8 text-xs text-gray-400">&copy; 2026 Digital Meyasubako System</footer>

    <script>
        // ⚠️【要書き換え】先ほどデプロイしたGASのWebアプリURLを入力
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycby_n6kO6vLnOUnVAhQgAbr052pdxuMdXbiR1R9fPJDhNh5inohnrtOZXuMFCq_ex1CM/exec";

        const alertBox = document.getElementById("alert-box");

        function showAlert(message, type) {
            alertBox.innerText = message;
            alertBox.className = `mb-6 p-3 rounded-lg text-sm font-medium ${
                type === 'error' ? 'bg-red-50 text-red-700' : 'bg-blue-50 text-blue-700'
            }`;
            alertBox.classList.remove("hidden");
        }

        // JWT（Googleから返ってくる暗号トークン）をデコードしてメールアドレスを引っこ抜く関数
        function decodeJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // Googleログインが成功した時に自動で呼ばれるコールバック関数
        // Googleログインが成功した時に自動で呼ばれるコールバック関数
async function handleCredentialResponse(response) {
    showAlert("学校アカウントを確認中...", "info");
    
    try {
        // 1. Googleから届いたデータを解析してメールアドレスを取得
        const responsePayload = decodeJwt(response.credential);
        const email = responsePayload.email;

        // 2. GASのAPIにメールアドレスを送信してロール（権限）を問い合わせる
        const res = await fetch(GAS_API_URL, {
            method: "POST",
            body: JSON.stringify({ email: email })
        });
        
        const result = await res.json();

        if (result.status === "success") {
            showAlert("認証成功！画面を切り替えます...", "info");
            
            // ブラウザのメモリに一時的にユーザー情報を保存（次のページで使うため）
            sessionStorage.setItem("user_email", email);
            sessionStorage.setItem("user_role", result.role);

            // 3. 役割に応じてリダイレクト
            setTimeout(() => {
                if (result.role === "admin") {
                    window.location.href = "admin.html";   // 👑 管理者は最高権限画面へ
                } else if (result.role === "council" || result.role === "vice_president" || result.role === "teacher" || result.role ==="chairperson") {
                    window.location.href = "council.html"; // 役職メンバーは生徒会画面へ
                } else {
                    window.location.href = "mypage.html";   // それ以外の一般生徒はマイページへ
                }
            }, 800);
        } else {
            showAlert("認証に失敗しました。ユーザー情報が見つかりません。", "error");
        }
    } catch (error) {
        console.error(error);
        showAlert("エラーが発生しました。通信環境を確認してください。", "error");
    }
}
    </script>
</body>
</html>
