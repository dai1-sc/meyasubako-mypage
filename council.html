<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>デジタル目安箱 - 生徒会ポータル（利用停止中）</title>

  <!-- アイコン等は元ファイルに合わせる -->
  <link rel="icon" href="log.png" type="image/png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#130182">

  <!-- Tailwind を残して見た目を整えやすく -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ページ全体を中央のメンテナンスカードだけ表示する */
    html,body{height:100%;margin:0;background:#0f172a;color:#e6eef8;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
    .center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{max-width:720px;width:100%;background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));border-radius:14px;padding:28px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 8px 30px rgba(2,6,23,0.6);}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .logo img{width:40px;height:40px}
    .title{font-weight:800;color:#fff;font-size:20px}
    .sub{color:#cbd5e1;margin-top:10px;font-size:14px;}
    .btns{margin-top:22px;display:flex;gap:12px;flex-wrap:wrap}
    a.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700}
    .btn-primary{background:#f59e0b;color:#08122b}
    .btn-secondary{background:rgba(255,255,255,0.06);color:#e6eef8;border:1px solid rgba(255,255,255,0.04)}
    .notice{margin-top:14px;background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;color:#dbeafe;font-size:13px;border:1px solid rgba(255,255,255,0.02)}
    /* モバイルで少し余裕を */
    @media (max-width:520px){ .card{padding:18px} .title{font-size:18px} }
  </style>
</head>
<body>
  <div class="center-wrap">
    <div class="card" role="status" aria-live="polite">
      <div class="logo">
        <img src="logo1.png" alt="ロゴ">
        <div>
          <div class="title">デジタル目安箱 — 生徒会ポータル（現在利用停止中）</div>
          <div class="sub">このページは一時的にアクセスが無効化されています。</div>
        </div>
      </div>

      <p class="notice">
        現在、生徒会ポータル（council.html）は保守のため一時的に停止しています。停止中は一覧の取得・更新やチャット機能などすべての操作が無効化されています。運用を再開したら当ページを復帰させます。
      </p>

      <div class="btns">
        <!-- 生徒側トップに戻るボタン -->
        <a class="btn btn-primary" href="mypage.html" aria-label="マイページへ戻る">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="#08122b" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12h18M12 3l9 9-9 9"/></svg>
          マイページへ戻る
        </a>

        <!-- 管理者・生徒会向けの連絡（例） -->
        <a class="btn btn-secondary" href="mailto:admin@school.example?subject=生徒会ポータル停止について" aria-label="管理者へ連絡">
          <i class="fas fa-envelope" aria-hidden="true"></i> 管理者へ連絡
        </a>
      </div>

      <p class="sub" style="margin-top:18px">（必要に応じて管理者にお問い合わせください。復帰時はこちらのページを再デプロイしてください。）</p>
    </div>
  </div>

  <!-- 重要: 以下のスクリプトは一切サーバへ問い合わせをしないように空にしています。
       元ファイルを復帰させるときはこのスニペットを削除して元のスクリプトを戻してください。 -->
  <script>
    // アクセス不可状態: 以降のJS処理を止めるため、何もしないファイルとして残します。
    // もしページを元に戻す場合はこのファイルを元の council.html のバックアップと差し替えてください。
    // 追記: 開発者のための簡単なログ（コンソールにだけ出る）
    console.info("council.html は現在アクセス不可モードです（表示のみ）。");
  </script>
</body>
</html>
