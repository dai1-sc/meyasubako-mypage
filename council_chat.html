<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル目安箱 - 生徒会対話ルーム</title>
    <link rel="icon" href="log.png" type="image/png">
     <!-- ブラウザ用 -->
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- iPhone・iPad ホーム画面 -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- Android・PWA -->
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#130182">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="デジタル目安箱">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        .brand-bg { background-color: #130182; }
        .brand-text { color: #130182; }
        /* スクロールバーを滑らかにする設定 */
        #chat-container {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <nav class="brand-bg text-white shadow-md shrink-0">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <button onclick="goBack()" class="flex items-center space-x-1 text-sm bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition">
                <i class="fas fa-arrow-left"></i>
                <span>戻る</span>
            </button>
            <span class="font-bold tracking-wider">目安箱・対話チャットルーム</span>
            <div class="w-16"></div>
        </div>
    </nav>

    <main class="max-w-3xl w-full mx-auto flex-1 flex flex-col overflow-hidden p-4 space-y-4">
        
        <div id="suggestion-summary" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 shrink-0">
            <div class="flex items-center space-x-2 text-[11px] font-bold text-gray-400 mb-1">
                <span id="sum-category" class="bg-gray-100 px-2 py-0.5 rounded text-gray-600">---</span>
                <span id="sum-date">---</span>
                <span id="sum-status" class="px-2 py-0.5 rounded text-white font-medium ml-auto">---</span>
            </div>
            <h2 id="sum-title" class="text-sm font-bold text-gray-800 line-clamp-1">読み込み中...</h2>
            <p id="sum-content" class="text-xs text-gray-500 mt-1 whitespace-pre-wrap max-h-20 overflow-y-auto">---</p>
        </div>

        <div id="chat-container" class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 p-4 overflow-y-auto flex flex-col space-y-3">
            <div id="chat-loading" class="text-center py-8 text-gray-400 my-auto">
                <i class="fas fa-spinner animate-spin text-xl mb-1"></i>
                <p class="text-xs">メッセージ履歴を読込中...</p>
            </div>
        </div>

        <form id="chat-form" class="flex items-center space-x-2 shrink-0">
            <textarea id="chat-input" placeholder="メッセージを入力...&#10;[Enter]で送信 / [Shift+Enter]で改行" autocomplete="off" class="flex-1 bg-white border border-gray-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-900 shadow-sm resize-none h-12 leading-relaxed" required></textarea>
            <button type="submit" id="btn-send" class="brand-bg text-white w-12 h-12 rounded-xl hover:bg-opacity-90 transition flex items-center justify-center shadow-sm shrink-0">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </form>
    </main>

    <script>
        // ⚠️【要書き換え】デプロイしたGASのWebアプリURL入力
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycby_n6kO6vLnOUnVAhQgAbr052pdxuMdXbiR1R9fPJDhNh5inohnrtOZXuMFCq_ex1CM/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const suggestionId = urlParams.get('id');
        
        const userEmail = sessionStorage.getItem("user_email");
        const userRole = sessionStorage.getItem("user_role");

        if (!userEmail || !suggestionId || 
            (userRole !== "chairperson" && userRole !== "vice_president" && userRole !== "teacher" && userRole !== "admin" && userRole !== "council")) {
            window.location.href = "index.html";
        }

        const chatContainer = document.getElementById("chat-container");
        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");

        function goBack() {
            if (userRole === "admin") {
                window.location.href = "admin.html";
            } else if (userRole === "chairperson" || userRole === "vice_president" || userRole === "teacher" || userRole === "council") {
                window.location.href = "council.html";
            } else {
                window.location.href = "mypage.html";
            }
        }

        // ==========================================
        // 1. チャット履歴＆意見を取得して描画（✨アニメーション対応）
        // ==========================================
        async function loadCouncilChatLog() {
            try {
                const res = await fetch(`${GAS_API_URL}?action=getCouncilChatLog&suggestionId=${suggestionId}&email=${encodeURIComponent(userEmail)}`);
                const data = await res.json();
                
                if (data.status === "error") {
                    alert("アクセス権限がないか、エラーが発生しました。");
                    goBack();
                    return;
                }

                // 上部要約の更新
                document.getElementById("sum-category").innerText = data.suggestion.category;
                document.getElementById("sum-date").innerText = data.suggestion.date;
                document.getElementById("sum-title").innerText = data.suggestion.title;
                document.getElementById("sum-content").innerText = data.suggestion.content;
                
                const statusBadge = document.getElementById("sum-status");
                statusBadge.innerText = data.suggestion.status;
                if (data.suggestion.status === "受付") statusBadge.className = "px-2 py-0.5 rounded text-white text-[10px] font-bold bg-blue-500 ml-auto";
                if (data.suggestion.status === "生徒会検討中") statusBadge.className = "px-2 py-0.5 rounded text-white text-[10px] font-bold bg-yellow-500 ml-auto";
                if (data.suggestion.status === "先生方検討中") statusBadge.className = "px-2 py-0.5 rounded text-white text-[10px] font-bold bg-purple-500 ml-auto";
                if (data.suggestion.status === "回答完了") statusBadge.className = "px-2 py-0.5 rounded text-white text-[10px] font-bold bg-green-500 ml-auto";
                
                document.getElementById("chat-loading").classList.add("hidden");
                
                // 💡 現在画面に描画されている既存メッセージの件数を取得
                const currentMsgCount = chatContainer.querySelectorAll('.msg-bubble').length;

                if (data.chats.length === 0) {
                    if(!chatContainer.querySelector('.no-msg-info')) {
                        // メッセージがない場合の初期化
                        const bubbles = chatContainer.querySelectorAll('.msg-bubble');
                        bubbles.forEach(el => el.remove());
                        
                        const infoMsg = document.createElement("div");
                        infoMsg.className = "no-msg-info text-center text-[11px] text-gray-400 my-auto bg-slate-50 p-4 rounded-xl border border-dashed border-gray-200 animate__animated animate__fadeIn";
                        infoMsg.innerHTML = `<i class="fas fa-reply text-lg mb-1 block"></i>生徒へメッセージを直接送ることができます。`;
                        chatContainer.appendChild(infoMsg);
                    }
                } else {
                    const noInfo = chatContainer.querySelector('.no-msg-info');
                    if(noInfo) noInfo.remove();

                    // 💡 新着メッセージがある、または初回読み込み時のみ追加描画する（チラつき防止）
                    if (currentMsgCount !== data.chats.length) {
                        
                        // 一旦古い要素をクリア
                        const existingMsgs = chatContainer.querySelectorAll('.msg-bubble');
                        existingMsgs.forEach(el => el.remove());

                        data.chats.forEach((chat, index) => {
                            const isMe = (chat.sender === "admin" && userRole === "admin") || 
                                         (chat.sender === "teacher" && userRole === "teacher") ||
                                         (chat.sender === "chairperson" && userRole === "chairperson") ||
                                         (chat.sender === "vice_president" && userRole === "vice_president") ||
                                         (chat.sender === "council" && userRole === "council");
                            
                            const wrapper = document.createElement("div");
                            
                            // 💡 アニメーションのクラス判定ロジック
                            let animationClass = "";
                            if (currentMsgCount === 0) {
                                // 初回読み込み時は静かにフェードイン
                                animationClass = "animate__animated animate__fadeIn animate__fast";
                            } else if (index >= currentMsgCount) {
                                // 15秒更新や自分が打って件数が増えた新着メッセージだけポンッと下から飛び出す！
                                animationClass = "animate__animated animate__backInUp animate__fast";
                            }

                            // クラスを結合
                            wrapper.className = `msg-bubble flex flex-col w-full max-w-[75%] ${isMe ? 'items-end ml-auto' : 'items-start'} ${animationClass}`;

                            // 初回のみパラパラと表示させる遅延設定
                            if (currentMsgCount === 0) {
                                wrapper.style.animationDelay = `${index * 0.01}s`;
                            }

                            let nameText = "生徒（匿名）";
                            let bubbleClass = "bg-gray-100 text-gray-800 rounded-tl-none"; 

                            if (isMe) {
                                if (chat.sender === "admin") {
                                    nameText = "あなた（システム管理者 👑）";
                                    bubbleClass = "bg-red-900 text-white rounded-tr-none shadow-md font-medium border border-red-700";
                                } else if (chat.sender === "teacher") {
                                    nameText = "あなた（先生）";
                                    bubbleClass = "bg-purple-900 text-white rounded-tr-none";
                                } else {
                                    nameText = "あなた（生徒会役員）";
                                    bubbleClass = "bg-indigo-900 text-white rounded-tr-none";
                                }
                            } else {
                                if (chat.sender === "admin") {
                                    nameText = "システム管理者 👑";
                                    bubbleClass = "bg-red-50 text-red-950 rounded-tl-none border border-red-200 font-medium";
                                } else if (chat.sender === "teacher") {
                                    nameText = "先生";
                                    bubbleClass = "bg-purple-50 text-purple-950 rounded-tl-none border border-purple-200";
                                } else if (chat.sender === "council" || chat.sender === "chairperson" || chat.sender === "vice_president") {
                                    nameText = "生徒会役員";
                                    bubbleClass = "bg-indigo-50 text-indigo-950 rounded-tl-none border border-indigo-200";
                                } else {
                                    nameText = "生徒（匿名）";
                                    bubbleClass = "bg-gray-100 text-gray-800 rounded-tl-none";
                                }
                            }
                            
                            let adminButtonsHTML = "";
                            if (userRole === "admin" && chat.id) {
                                adminButtonsHTML = `
                                    <div class="flex space-x-2 text-[10px] text-gray-400 mt-1 px-1">
                                        <button onclick="editMessage('${chat.id}', '${encodeURIComponent(chat.message)}')" class="hover:text-blue-600 transition flex items-center space-x-0.5">
                                            <i class="fas fa-edit"></i> <span>編集</span>
                                        </button>
                                        <button onclick="deleteMessage('${chat.id}')" class="hover:text-red-500 transition flex items-center space-x-0.5">
                                            <i class="fas fa-trash-alt"></i> <span>削除</span>
                                        </button>
                                    </div>
                                `;
                            }

                            const nameLabel = `<span class="text-[10px] font-bold text-gray-400 mb-0.5 px-1">${nameText}</span>`;
                            const bubble = `
                                <div class="p-3 rounded-2xl text-sm shadow-sm tracking-wide ${bubbleClass}">
                                    <p class="whitespace-pre-wrap">${chat.message}</p>
                                </div>
                                <div class="flex items-center space-x-1 justify-between w-full ${isMe ? 'justify-end' : ''}">
                                    <span class="text-[9px] text-gray-400 mt-0.5 px-1">${chat.timestamp} ${isMe && chat.isRead ? '（既読）' : ''}</span>
                                </div>
                            `;
                            
                            wrapper.innerHTML = nameLabel + bubble;
                            if(adminButtonsHTML) {
                                const btnContainer = document.createElement("div");
                                btnContainer.innerHTML = adminButtonsHTML;
                                wrapper.appendChild(btnContainer);
                            }
                            chatContainer.appendChild(wrapper);
                        });

                        // 🏄‍♂️ 最下部へ自動スクロール（初回は瞬時に、新着は滑らかにスクロール）
                        if (currentMsgCount === 0) {
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        } else {
                            setTimeout(() => {
                                chatContainer.scrollTo({
                                    top: chatContainer.scrollHeight,
                                    behavior: 'smooth'
                                });
                            }, 60);
                        }
                    }
                }

            } catch (error) {
                console.error(error);
            }
        }

        // ==========================================
        // 2. メッセージ送信処理
        // ==========================================
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const messageText = chatInput.value.trim();
            if (!messageText) return;

            const btnSend = document.getElementById("btn-send");
            btnSend.disabled = true;
            chatInput.disabled = true;

            try {
                const res = await fetch(GAS_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "sendChatMessage",
                        suggestionId: suggestionId,
                        email: userEmail,
                        sender: userRole, 
                        message: messageText
                    })
                });
                const result = await res.json();

                if (result.status === "success") {
                    chatInput.value = "";
                    // 💡 送信成功直後にリロードを呼び出し、新着メッセージとしてポップアップさせる
                    await loadCouncilChatLog();
                } else {
                    alert("送信失敗: " + result.message);
                }
            } catch (error) {
                console.error(error);
            } finally {
                btnSend.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        });

        // Shift+Enterで改行、Enterで送信制御
        chatInput.addEventListener("keydown", function(e) {
            if (e.isComposing || e.keyCode === 229) return;
            if (e.key === "Enter") {
                if (e.shiftKey) return;
                e.preventDefault();
                if (chatInput.value.trim() !== "") chatForm.requestSubmit();
            }
        });

        // ==========================================
        // 👑 3. 【特権機能】管理者専用：編集・削除処理
        // ==========================================
        async function editMessage(messageId, oldMessageEncoded) {
            const oldMessage = decodeURIComponent(oldMessageEncoded);
            const newMessage = prompt("メッセージを編集します。新しい内容を入力してください：", oldMessage);
            
            if (newMessage === null) return;
            if (newMessage.trim() === "") {
                alert("空のメッセージには編集できません。消去したい場合は「削除」を使用してください。");
                return;
            }

            try {
                const res = await fetch(GAS_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "editChatMessage",
                        email: userEmail,
                        messageId: messageId,
                        newMessage: newMessage.trim()
                    })
                });
                const result = await res.json();
                if (result.status === "success") {
                    // 編集・削除時は全件の整合性を保つため一旦全クリアして再描画
                    chatContainer.querySelectorAll('.msg-bubble').forEach(el => el.remove());
                    loadCouncilChatLog();
                } else {
                    alert("編集に失敗しました: " + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("通信エラーが発生しました。");
            }
        }

        async function deleteMessage(messageId) {
            if (!confirm("本当にこのメッセージをスプレッドシートから完全に削除しますか？\n（この操作は取り消せません）")) {
                return;
            }

            try {
                const res = await fetch(GAS_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "deleteChatMessage",
                        email: userEmail,
                        messageId: messageId
                    })
                });
                const result = await res.json();
                if (result.status === "success") {
                    // 編集・削除時は全件の整合性を保つため一旦全クリアして再描画
                    chatContainer.querySelectorAll('.msg-bubble').forEach(el => el.remove());
                    loadCouncilChatLog();
                } else {
                    alert("削除に失敗しました: " + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("通信エラーが発生しました。");
            }
        }

        window.onload = loadCouncilChatLog;
        setInterval(loadCouncilChatLog, 15000); // 15秒自動更新
    </script>
</body>
</html>
