<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>投書マイページ</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">

  <!-- Firebase CDN（compat版） -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    #userBox {
      text-align: center;
      margin-bottom: 20px;
      font-size: 16px;
      color: #555;
    }

    .post {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: white;
      margin-bottom: 8px;
    }

    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      background: #eee;
      color: #333;
      margin-top: 8px;
    }

    #posts {
      max-width: 600px;
      margin: auto;
    }

    .loading {
      text-align: center;
      padding: 20px;
      font-size: 16px;
      color: #777;
    }
  </style>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDdw_CrJ6I9OasCND_OkbDSzyeBXr66LVw",
      authDomain: "meyasubako-login-d39bb.firebaseapp.com",
      projectId: "meyasubako-login-d39bb",
      storageBucket: "meyasubako-login-d39bb.appspot.com",
      messagingSenderId: "472226741247",
      appId: "1:472226741247:web:e06d9f94a046e2a26905ca"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
  </script>
</head>

<body>

  <h2>投書マイページ</h2>
  <div id="userBox">ログイン確認中...</div>

  <div id="posts" class="loading">読み込み中...</div>

  <script>
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("userBox").innerHTML =
        "ログイン中：" + user.email;

      const apiUrl =
        "https://script.google.com/macros/s/【あなたのWebAppURL】/exec?email=" +
        encodeURIComponent(user.email);

      fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
          const posts = document.getElementById("posts");
          posts.innerHTML = "";

          if (data.length === 0) {
            posts.innerHTML = "<div class='loading'>投書はありません。</div>";
            return;
          }

          data.forEach(p => {
            const div = document.createElement("div");
            div.className = "post";

            // カテゴリ色
            const colors = {
              "生活": "#3498db",
              "設備": "#e67e22",
              "行事": "#9b59b6",
              "その他": "#7f8c8d"
            };
            const tagColor = colors[p.category] || "#7f8c8d";

            div.innerHTML = `
              <span class="tag" style="background:${tagColor}">${p.category}</span>
              <div><b>内容：</b><br>${p.detail}</div>
              <div class="status"><b>ステータス：</b> ${p.status}</div>
            `;
            posts.appendChild(div);
          });
        })
        .catch(err => {
          console.error("APIエラー:", err);
          document.getElementById("posts").innerHTML =
            "<div class='loading'>データの取得に失敗しました。</div>";
        });
    });
  </script>

</body>
</html>
