<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル目安箱 - システム管理者ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 管理者専用の重厚感あるプレミアムカラー（深みのある赤紫） */
        .admin-bg { background-color: #4a042e; }
        .admin-text { color: #4a042e; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <nav class="admin-bg text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-crown text-amber-400 text-xl animate-bounce"></i>
                <span class="font-bold tracking-wider text-amber-200">システム管理者専用ポータル</span>
            </div>
            <button onclick="logout()" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition">
                ログアウト
            </button>
        </div>
    </nav>

    <main class="max-w-5xl w-full mx-auto p-4 md:p-6 flex-1 flex flex-col space-y-6">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-5 rounded-xl shadow-sm border-l-4 border-amber-500">
            <div>
                <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    全校目安箱 統括コントロールパネル
                </h1>
                <p class="text-xs text-gray-500 mt-0.5">全ての生徒からの投稿状況の閲覧、ステータス制御、および「システム管理者 👑」としての特権チャット介入が可能です。</p>
            </div>
            <button onclick="loadAdminData()" class="self-start md:self-auto flex items-center space-x-1 text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg transition">
                <i class="fas fa-sync-alt"></i>
                <span>全データを同期更新</span>
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex-1 flex flex-col">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-gray-100 text-xs font-bold text-gray-500 tracking-wider">
                            <th class="p-4 w-24">投稿日</th>
                            <th class="p-4 w-28">カテゴリ</th>
                            <th class="p-4">タイトル / 内容の要約</th>
                            <th class="p-4 w-32">対応ステータス</th>
                            <th class="p-4 w-28 text-center">特権チャット</th>
                        </tr>
                    </thead>
                    <tbody id="suggestion-table-body" class="divide-y divide-gray-50 text-sm text-gray-700">
                        <tr id="table-loading">
                            <td colspan="5" class="text-center py-12 text-gray-400">
                                <i class="fas fa-spinner animate-spin text-xl mb-2 block"></i>
                                <span class="text-xs">スプレッドシートから全意見を取得中...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ⚠️【要書き換え】デプロイしたGASのWebアプリURLを入力
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycby_n6kO6vLnOUnVAhQgAbr052pdxuMdXbiR1R9fPJDhNh5inohnrtOZXuMFCq_ex1CM/exec";

        // 厳重な権限チェック (admin のみアクセス可)
        const userRole = sessionStorage.getItem("user_role");
        const userEmail = sessionStorage.getItem("user_email");
        
        if (!userEmail || userRole !== "admin") {
            alert("このページは最高管理者(admin)専用です。アクセス権限がありません。");
            window.location.href = "index.html";
        }

        const tableBody = document.getElementById("suggestion-table-body");

        // ==========================================
        // 1. 管理者として全データをGASから取得して描画
        // ==========================================
        async function loadAdminData() {
            tableBody.innerHTML = `
                <tr id="table-loading">
                    <td colspan="5" class="text-center py-12 text-gray-400">
                        <i class="fas fa-spinner animate-spin text-xl mb-2 block"></i>
                        <span class="text-xs">最高権限でデータを同期中...</span>
                    </td>
                </tr>`;

            try {
                // 生徒会と同じAPIアクション(getCouncilData)を利用（GAS側でadminも許可しているため）
                const res = await fetch(`${GAS_API_URL}?action=getCouncilData&email=${encodeURIComponent(userEmail)}`);
                const data = await res.json();

                if (data.status === "error") {
                    alert("データ取得エラー: " + data.message);
                    return;
                }

                tableBody.innerHTML = ""; // ローディング消去

                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-400 text-xs">現在、目安箱に届いている意見はありません。</td></tr>`;
                    return;
                }

                data.forEach(item => {
                    const tr = document.createElement("tr");
                    tr.className = "hover:bg-purple-50/30 transition-colors border-b border-gray-100";

                    // ステータスに応じたセレクトボックスの色
                    let selectBg = "bg-blue-50 text-blue-700 border-blue-200";
                    if (item.status === "生徒会検討中") selectBg = "bg-yellow-50 text-yellow-700 border-yellow-200";
                    if (item.status === "先生方検討中") selectBg = "bg-purple-50 text-purple-700 border-purple-200";
                    if (item.status === "回答完了") selectBg = "bg-green-50 text-green-700 border-green-200";

                    // 開示請求承認パネルの組み立て
                    let approvalControlsHTML = "";
                    if (item.status === "開示請求") {
                        approvalControlsHTML = `
                            <div class="mt-2.5 p-3 bg-red-50/50 border border-red-200/60 rounded-xl text-xs space-y-2 max-w-xs shadow-sm">
                                <div class="font-bold text-red-700 mb-1 flex items-center gap-1">
                                    <i class="fas fa-shield-alt"></i> 🚨 アドレス開示請求・3者承認状況
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-600">副会長:</span>
                                    <div>
                                        ${item.approvals?.vice_president ? '<span class="text-green-600 font-bold">✅ 承認済</span>' : ((typeof userRole !== 'undefined' && userRole === 'vice_president')) ? `<button onclick="approveRequest('${item.id}', 'vice_president')" class="bg-blue-600 text-white px-1.5 py-0.5 rounded text-[9px] hover:bg-blue-700 font-bold">承認</button>` : '<span class="text-gray-400">⏳ 未承認</span>'}
                                    </div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-600">管理者:</span>
                                    <div>
                                        ${item.approvals?.admin ? '<span class="text-red-600 font-bold">✅ 承認済</span>' : ((typeof userRole !== 'undefined' && userRole === 'admin')) ? `<button onclick="approveRequest('${item.id}', 'admin')" class="bg-red-600 text-white px-1.5 py-0.5 rounded text-[9px] hover:bg-red-700 font-bold">承認</button>` : '<span class="text-gray-400">⏳ 未承認</span>'}
                                    </div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-600 font-medium">担 当:</span>
                                    <div>
                                        ${item.approvals?.teacher ? '<span class="text-purple-600 font-bold">✅ 承認済</span>' : ((typeof userRole !== 'undefined' && userRole === 'teacher')) ? `<button onclick="approveRequest('${item.id}', 'teacher')" class="bg-purple-600 text-white px-2 py-0.5 rounded text-[10px] hover:bg-purple-700 font-bold shadow-sm transition">承認する</button>` : '<span class="text-gray-400">⏳ 未承認</span>'}
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    // 3人全員の承認が揃っている場合のみ表示するアドレス情報のHTMLを作成
                    let disclosureHTML = "";
                    if (item.isFullyApproved === true) {
                        disclosureHTML = `
                            <div class="mt-2 p-2.5 bg-red-50 border border-red-200 rounded-lg">
                                <div class="text-[11px] font-bold text-red-700 flex items-center gap-1 animate-pulse">
                                    <i class="fas fa-exclamation-triangle"></i> 3者開示承認済・要対応
                                </div>
                                <div class="text-xs text-red-950 mt-1 bg-white p-2 rounded border border-red-100 font-mono font-bold flex items-center justify-between">
                                    <span>投稿者アドレス:</span>
                                    <span class="text-red-600 select-all">${item.studentEmail}</span>
                                </div>
                            </div>
                        `;
                    }

                    // テーブルの行の組み立て
                    tr.innerHTML = `
                        <td class="p-4 text-xs text-gray-400 whitespace-nowrap">${item.date}</td>
                        <td class="p-4 whitespace-nowrap">
                            <span class="bg-gray-100 px-2 py-1 rounded text-xs font-medium text-gray-600">${item.category}</span>
                        </td>
                        <td class="p-4 max-w-xs md:max-w-md">
                            <div class="font-bold text-gray-800 truncate">${item.title}</div>
                            <div class="text-xs text-gray-400 truncate mt-0.5">${item.content}</div>
                            
                            ${approvalControlsHTML}
                            ${disclosureHTML}
                        </td>
                        <td class="p-4 whitespace-nowrap">
                            <select id="status-${item.id}" onchange="updateStatus('${item.id}', this.value)" class="${selectBg} text-xs font-bold px-2 py-1.5 rounded-lg border focus:outline-none focus:ring-2 focus:ring-purple-200 transition-all cursor-pointer">
                                <option value="新規受付" ${item.status === '新規受付' ? 'selected' : ''}>🔵 新規受付</option>
                                <option value="生徒会検討中" ${item.status === '生徒会検討中' ? 'selected' : ''}>🟡 生徒会検討中</option>
                                <option value="先生方検討中" ${item.status === '先生方検討中' ? 'selected' : ''}>🟣 先生方検討中</option>
                                <option value="回答完了" ${item.status === '回答完了' ? 'selected' : ''}>🟢 回答完了</option>
                                <option value="開示請求" ${item.status === '開示請求' ? 'selected' : ''}>🔴 開示請求</option>
                            </select>
                        </td>
                        <td class="p-4 text-center whitespace-nowrap">
                            <button onclick="openChatModal('${item.id}')" class="relative p-2 text-gray-400 hover:text-purple-600 transition-colors">
                                <i class="fas fa-comment-dots text-lg"></i>
                                ${item.hasUnread ? '<span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>' : ''}
                            </button>
                        </td>
                    `;
                    
                    tableBody.appendChild(tr);
                });

            } catch (error) {
                console.error(error);
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-red-500 text-xs">データの同期に失敗しました。再読み込みしてください。</td></tr>`;
            }
        }

        // ==========================================
        // 2. ステータス変更をGASに反映
        // ==========================================
        async function updateStatus(suggestionId, selectElement) {
            const newStatus = selectElement.value;
            selectElement.disabled = true;

            try {
                const res = await fetch(GAS_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "updateStatus",
                        suggestionId: suggestionId,
                        status: newStatus,
                        email: userEmail
                    })
                });
                const result = await res.json();

                if (result.status === "success") {
                    selectElement.className = "text-xs font-bold rounded-lg border px-2 py-1.5 focus:outline-none cursor-pointer shadow-sm ";
                    if (newStatus === "受付" || newStatus === "新規受付") selectElement.classList.add("bg-blue-50", "text-blue-700", "border-blue-200");
                    if (newStatus === "生徒会検討中") selectElement.classList.add("bg-yellow-50", "text-yellow-700", "border-yellow-200");
                    if (newStatus === "先生方検討中") selectElement.classList.add("bg-purple-50", "text-purple-700", "border-purple-200");
                    if (newStatus === "回答完了") selectElement.classList.add("bg-green-50", "text-green-700", "border-green-200");
                    if (newStatus === "開示請求") selectElement.classList.add("bg-red-50", "text-red-700", "border-red-200");
                } else {
                    alert("変更に失敗しました: " + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("通信エラーが発生しました。");
            } finally {
                selectElement.disabled = false;
            }
        }

        // ✨【修正箇所】呼び出しボタンに合わせて関数名を openChatModal に変更
        function openChatModal(id) {
            window.location.href = `council_chat.html?id=${id}`;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        // 起動時に自動ロード
        window.onload = loadAdminData;

        // 3者承認用関数
        async function approveRequest(suggestionId, roleToApprove) {
            if (!confirm("本当にこの事案の身元開示を承認しますか？\n※この操作は取り消せません。")) return;
            
            const senderEmail = typeof userEmail !== 'undefined' ? userEmail : sessionStorage.getItem("user_email") || "";
            
            try {
                const response = await fetch(GAS_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "approveDisclosure",
                        email: senderEmail,
                        suggestionId: suggestionId,
                        role: roleToApprove
                    })
                });
                const res = await response.json();
                if (res.status === "success") {
                    alert("承認を記録しました！");
                    loadAdminData();
                } else {
                    alert("エラー: " + res.message);
                }
            } catch (e) {
                console.error(e);
                alert("通信に失敗しました。");
            }
        }
    </script>
</body>
</html>
