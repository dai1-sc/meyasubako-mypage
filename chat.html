<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル目安箱 - 相談チャット</title>
    <link rel="icon" href="log.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        .brand-bg { background-color: #130182; }
        .brand-text { color: #130182; }
        
        /* チャット画面専用のスリムスクロールバー */
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    </style>
</head>
<body class="bg-slate-100 font-sans h-screen flex flex-col text-slate-800 antialiased overflow-hidden">

    <nav class="brand-bg text-white shadow-lg shadow-indigo-950/10 shrink-0 sticky top-0 z-30">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <button onclick="window.location.href='mypage.html'" class="flex items-center space-x-1 text-xs font-black bg-white/10 hover:bg-white/20 active:scale-95 px-3 py-2 rounded-xl transition duration-300">
                <i class="fas fa-arrow-left"></i>
                <span>マイページへ</span>
            </button>
            <span class="font-black tracking-widest text-sm">相談チャットルーム</span>
            <div class="w-20"></div> 
        </div>
    </nav>

    <main class="max-w-3xl w-full mx-auto flex-1 flex flex-col overflow-hidden p-4 space-y-3">
        
        <div id="suggestion-summary" onclick="toggleSummaryDetails()" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200/60 shrink-0 cursor-pointer hover:bg-slate-50 transition duration-300 select-none">
            <div class="flex items-center space-x-2 text-[10px] font-black text-slate-400 mb-1.5">
                <span id="sum-category" class="bg-slate-100 px-2.5 py-1 rounded-xl text-slate-600 font-bold">---</span>
                <span id="sum-date" class="font-mono">---</span>
                <span id="sum-status" class="px-2.5 py-0.5 rounded-full text-white font-black ml-auto tracking-wider scale-90 origin-right">---</span>
            </div>
            <div class="flex justify-between items-center">
                <h2 id="sum-title" class="text-xs font-black text-slate-700 line-clamp-1 pr-4">読み込み中...</h2>
                <i id="summary-chevron" class="fas fa-chevron-down text-xs text-slate-400 transition-transform duration-300"></i>
            </div>
            <div id="sum-content-wrapper" class="max-h-0 overflow-hidden transition-all duration-300 ease-out">
                <p id="sum-content" class="text-xs text-slate-500 mt-2.5 pt-2.5 border-t border-slate-100 whitespace-pre-wrap leading-relaxed font-medium overflow-y-auto max-h-28">---</p>
            </div>
        </div>

        <div id="chat-container" class="flex-1 bg-white rounded-3xl shadow-sm border border-slate-200/60 p-4 overflow-y-auto flex flex-col space-y-4 bg-gradient-to-b from-white to-slate-50/50">
            <div id="chat-loading" class="text-center py-8 text-slate-400 my-auto">
                <i class="fas fa-circle-notch animate-spin text-2xl brand-text mb-2 block"></i>
                <p class="text-xs font-bold text-slate-400 tracking-wider">トーク履歴を取得中...</p>
            </div>
        </div>

        <form id="chat-form" class="flex items-center space-x-2 shrink-0 pb-2 md:pb-0">
            <input type="text" id="chat-input" placeholder="メッセージを入力..." autocomplete="off" class="flex-1 bg-white border border-slate-200 rounded-2xl px-4 py-3.5 text-xs font-medium placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-900 shadow-sm transition duration-300" required>
            <button type="submit" id="btn-send" class="brand-bg text-white w-12 h-12 rounded-2xl hover:bg-opacity-90 active:scale-95 transition-all duration-300 flex items-center justify-center shadow-lg shadow-indigo-600/10 shrink-0">
                <i class="fas fa-paper-plane text-xs transform hover:rotate-12 transition"></i>
            </button>
        </form>
    </main>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycby_n6kO6vLnOUnVAhQgAbr052pdxuMdXbiR1R9fPJDhNh5inohnrtOZXuMFCq_ex1CM/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const suggestionId = urlParams.get('id');
        const userEmail = sessionStorage.getItem("user_email");

        if (!userEmail || !suggestionId) {
            window.location.href = "index.html";
        }

        const chatContainer = document.getElementById("chat-container");
        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");
        // システムが受付停止中ならマイページへ戻す
async function checkSystemStatus() {
    try {
        const res = await fetch(`${GAS_API_URL}?action=getSystemStatus`);
        const result = await res.json();

        if (result.status === "success" && result.systemStatus === "maintenance") {

            // 入力欄を非表示
            chatForm.style.display = "none";

            // 停止画面を表示
            chatContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center animate__animated animate__fadeIn">
                    <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mb-5">
                        <i class="fas fa-lock text-3xl text-red-500"></i>
                    </div>

                    <h2 class="text-lg font-black text-red-600 mb-2">
                        一時受付停止中
                    </h2>

                    <p class="text-sm text-slate-500 leading-relaxed max-w-xs">
                        現在は一時受付停止中のため、<br>
                        チャットを送信できません。
                    </p>

                    <p class="text-xs text-slate-400 mt-6">
                        3秒後にマイページへ戻ります...
                    </p>
                </div>
            `;

            setTimeout(() => {
                window.location.replace("mypage.html");
            }, 3000);

            return false;
        }

        return true;

    } catch (e) {
        console.error(e);
        return true;
    }
}

        // 💡 元の意見カードを開閉する関数
        function toggleSummaryDetails() {
            const wrapper = document.getElementById("sum-content-wrapper");
            const chevron = document.getElementById("summary-chevron");
            if (wrapper.style.maxHeight === "0px" || !wrapper.style.maxHeight) {
                wrapper.style.maxHeight = wrapper.scrollHeight + "px";
                chevron.style.transform = "rotate(180deg)";
            } else {
                wrapper.style.maxHeight = "0px";
                chevron.style.transform = "rotate(0deg)";
            }
        }
// ==========================================
        // 1. チャット履歴＆元の意見を取得して描画（最新メッセージのみアニメーション）
        // ==========================================
        async function loadChatLog() {
            try {
                const res = await fetch(`${GAS_API_URL}?action=getChatLog&suggestionId=${suggestionId}&email=${encodeURIComponent(userEmail)}`);
                const data = await res.json();
                
                if (data.status === "error") {
                    alert(data.message || "アクセス権限がないか、エラーが発生しました。");
                    window.location.href = "mypage.html";
                    return;
                }

                // 要約ヘッダーの更新
                document.getElementById("sum-category").innerText = data.suggestion.category;
                document.getElementById("sum-date").innerText = data.suggestion.date;
                document.getElementById("sum-title").innerText = data.suggestion.title;
                document.getElementById("sum-content").innerText = data.suggestion.content;
                
                const statusBadge = document.getElementById("sum-status");
                statusBadge.innerText = data.suggestion.status;
                if (data.suggestion.status === "受付") statusBadge.className = "px-2.5 py-0.5 rounded-xl text-white text-[9px] font-black bg-indigo-600 ml-auto";
                if (data.suggestion.status === "生徒会検討中") statusBadge.className = "px-2.5 py-0.5 rounded-xl text-white text-[9px] font-black bg-amber-500 ml-auto";
                if (data.suggestion.status === "先生方検討中") statusBadge.className = "px-2.5 py-0.5 rounded-xl text-white text-[9px] font-black bg-purple-500 ml-auto";
                if (data.suggestion.status === "回答完了") statusBadge.className = "px-2.5 py-0.5 rounded-xl text-white text-[9px] font-black bg-emerald-500 ml-auto";

                document.getElementById("chat-loading").classList.add("hidden");
                
                // 💡 修正のキモ：現在画面に表示されているメッセージ数をキープ
                const currentMsgCount = chatContainer.querySelectorAll('.msg-bubble').length;
                
                if (data.chats.length === 0) {
                    const existingInfo = chatContainer.querySelector('.info-msg');
                    if (!existingInfo) {
                        chatContainer.innerHTML = "";
                        const infoMsg = document.createElement("div");
                        infoMsg.className = "info-msg text-center text-[11px] font-bold text-slate-400 my-auto bg-slate-50 p-5 rounded-2xl border border-dashed border-slate-200 animate__animated animate__fadeIn";
                        infoMsg.innerHTML = `<i class="fas fa-comments text-xl brand-text mb-2 block animate-pulse"></i>生徒会への質問や補足があれば、ここから匿名で安全にチャット相談ができます。`;
                        chatContainer.appendChild(infoMsg);
                    }
                } else {
                    const existingInfo = chatContainer.querySelector('.info-msg');
                    if (existingInfo) existingInfo.remove();

                    // 新しいデータがある、または既読状態などの更新がある場合
                    if (currentMsgCount !== data.chats.length) {
                        
                        // 既存の要素を一旦クリア
                        const bubbles = chatContainer.querySelectorAll('.msg-bubble');
                        bubbles.forEach(el => el.remove());

                        data.chats.forEach((chat, index) => {
                            const isMe = (chat.sender === "student");
                            const wrapper = document.createElement("div");
                            
                            // 💡 【ここを大改造！】
                            // 1. 初回読み込み（currentMsgCount === 0）の時は、過去ログなので一瞬でフェードインさせる
                            // 2. チャットを打って件数が増えた時（index >= currentMsgCount）の「新しい文字」だけを下からポンッと湧き上がらせる！
                            let animationClass = "";
                            if (currentMsgCount === 0) {
                                animationClass = "animate__animated animate__fadeIn animate__fast"; // 初回は静かに
                            } else if (index >= currentMsgCount) {
                                animationClass = "animate__animated animate__backInUp animate__fast"; // 新着だけポンッ！
                            }

                            wrapper.className = `msg-bubble flex flex-col w-full max-w-[80%] ${isMe ? 'items-end ml-auto' : 'items-start'} ${animationClass}`;
                            
                            // 初回のみパラパラパラとテンポよく出すためのディレイ
                            if (currentMsgCount === 0) {
                                wrapper.style.animationDelay = `${index * 0.01}s`;
                            }

                            let nameText = "あなた（匿名生徒）";
                            let bubbleClass = "brand-bg text-white rounded-2xl rounded-tr-none shadow-sm shadow-indigo-900/5"; 

                            if (!isMe) {
                                if (chat.sender === "admin") {
                                    nameText = "先生（管理者） 👑";
                                    bubbleClass = "bg-amber-50 text-amber-950 rounded-2xl rounded-tl-none border border-amber-300 font-bold shadow-sm shadow-amber-500/5"; 
                                } else {
                                    nameText = "生徒会役員";
                                    bubbleClass = "bg-slate-100 text-slate-800 rounded-2xl rounded-tl-none border border-slate-200/40 shadow-sm";
                                }
                            }
                            
                            const nameLabel = `<span class="text-[10px] font-black text-slate-400 mb-0.5 px-1 tracking-wider">${nameText}</span>`;
                            const badgeRead = (isMe && chat.isRead) ? '<span class="text-indigo-600 font-black mr-1">既読</span>' : '';
                            
                            const bubble = `
                                <div class="p-3 px-4 rounded-2xl text-xs shadow-sm tracking-wide leading-relaxed ${bubbleClass}">
                                    <p class="whitespace-pre-wrap">${chat.message}</p>
                                </div>
                                <div class="flex items-center text-[9px] font-bold text-slate-400 mt-0.5 px-1 font-mono">
                                    ${badgeRead}<span>${chat.timestamp}</span>
                                </div>
                            `;
                            
                            wrapper.innerHTML = nameLabel + bubble;
                            chatContainer.appendChild(wrapper);
                        });

                        // 描画後、最下部までスクロール
                        setTimeout(() => {
                            chatContainer.scrollTo({
                                top: chatContainer.scrollHeight,
                                behavior: currentMsgCount === 0 ? 'auto' : 'smooth' // 新しい文字の時はヌルッとスクロール
                            });
                        }, 50);
                    }
                }

            } catch (error) {
                console.error(error);
                document.getElementById("chat-loading").innerHTML = `<p class="text-xs font-bold text-red-500">チャットの接続に失敗しました。</p>`;
            }
        }

        // ==========================================
        // 2. メッセージを送信する処理
        // ==========================================
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const messageText = chatInput.value.trim();
            if (!messageText) return;

            const btnSend = document.getElementById("btn-send");
            btnSend.disabled = true;
            chatInput.disabled = true;
            btnSend.classList.add("opacity-50");

            const payload = {
                action: "sendChatMessage",
                suggestionId: suggestionId,
                email: userEmail,
                sender: "student",
                message: messageText
            };

            try {
                const res = await fetch(GAS_API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.status === "success") {
                    chatInput.value = "";
                    // 送信後、即時ロードを叩いて自分の発言を表示させる
                    await loadChatLog();
                } else {
                    alert(result.message);
                    if (result.message.includes("停止")) {
                        window.location.href = "mypage.html";
                    }
                }
            } catch (error) {
                console.error(error);
                alert("通信エラーが発生しました。");
            } finally {
                btnSend.disabled = false;
                chatInput.disabled = false;
                btnSend.classList.remove("opacity-50");
                chatInput.focus();
            }
        });

       window.onload = async () => {
    const ok = await checkSystemStatus();
    if (!ok) return;

    loadChatLog();
};
        
        // 5秒ごとに新着メッセージがないか自動パトロール（リアルタイム化）
        setInterval(async () => {
    const ok = await checkSystemStatus();
    if (!ok) return;

    loadChatLog();
}, 10000);
    </script>
</body>
</html>
